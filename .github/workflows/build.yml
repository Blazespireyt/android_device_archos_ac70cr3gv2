name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y repo bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-core gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync squashfs-tools xsltproc zip zlib1g-dev

      - name: Init source
        run: |
          mkdir twrp
          cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-7.1

      - name: Sync
        run: |
          cd twrp
          repo sync -j$(nproc)

      - name: Copy device tree
        run: |
          mkdir -p twrp/device/archos/ac70cr3gv2
          rsync -a --exclude=.git ./ twrp/device/archos/ac70cr3gv2/

      - name: Build
        run: |
          cd twrp
          source build/envsetup.sh
          lunch omni_ac70cr3gv2-eng
          mka recoveryimage

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: twrp/out/target/product/ac70cr3gv2/recovery.img
