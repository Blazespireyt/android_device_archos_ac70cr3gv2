name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone minimal manifest
        run: |
          git clone --depth=1 -b twrp-11 https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git twrp

      - name: Copy device tree
        run: |
          mkdir -p twrp/device/archos
          cp -r . twrp/device/archos/ac70cr3gv2

      - name: Build
        run: |
          cd twrp
          source build/envsetup.sh
          lunch omni_ac70cr3gv2-eng
          mka recoveryimage

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: twrp/out/target/product/ac70cr3gv2/recovery.img
